<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Environment Checker</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #fafafa;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  width: 100%;
  max-width: 600px;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  padding: 40px;
}
h1 {
  font-size: 28px;
  font-weight: 700;
  color: #09090b;
  margin-bottom: 8px;
  text-align: center;
}
.subtitle {
  text-align: center;
  color: #a1a1aa;
  font-size: 14px;
  margin-bottom: 32px;
}
.check-item {
  padding: 16px;
  background: #fafafa;
  border-radius: 12px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.status {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status.pass { background: #22c55e; }
.status.fail { background: #ef4444; }
.status.loading { background: #a1a1aa; animation: pulse 1.5s infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.check-info { flex: 1; }
.check-name {
  font-size: 15px;
  font-weight: 600;
  color: #09090b;
  margin-bottom: 4px;
}
.check-message {
  font-size: 13px;
  color: #71717a;
}
.summary {
  margin-top: 24px;
  padding: 20px;
  background: #f9f9fb;
  border-radius: 12px;
  text-align: center;
}
.summary-text {
  font-size: 16px;
  font-weight: 600;
  color: #09090b;
}
button {
  width: 100%;
  padding: 14px;
  background: #09090b;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 16px;
}
button:hover { background: #27272a; }
</style>
</head>
<body>
<div class="container">
  <h1>Environment Checker</h1>
  <div class="subtitle">OpenClaw Manager</div>
  <div id="results"></div>
  <div id="summary" class="summary" style="display:none"></div>
  <button onclick="runCheck()">Run Check</button>
</div>
<script>
async function runCheck() {
  const resultsDiv = document.getElementById('results');
  const summaryDiv = document.getElementById('summary');
  resultsDiv.innerHTML = '<div class="check-item"><div class="status loading"></div><div class="check-info"><div class="check-name">Running checks...</div></div></div>';
  summaryDiv.style.display = 'none';
  
  const res = await fetch('/api/check');
  const data = await res.json();
  
  resultsDiv.innerHTML = '';
  let passed = 0, failed = 0;
  
  data.results.forEach(r => {
    if (r.status === 'pass') passed++;
    else failed++;
    
    resultsDiv.innerHTML += `
      <div class="check-item">
        <div class="status ${r.status}"></div>
        <div class="check-info">
          <div class="check-name">${r.name}</div>
          <div class="check-message">${r.message}</div>
        </div>
      </div>
    `;
  });
  
  summaryDiv.innerHTML = `<div class="summary-text">Passed: ${passed} | Failed: ${failed}</div>`;
  summaryDiv.style.display = 'block';
}
runCheck();
</script>
</body>
</html>
