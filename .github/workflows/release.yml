name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Package
        run: npm run package

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/openclaw-check-win-x64.exe
            dist/openclaw-check-macos-x64
            dist/openclaw-check-macos-arm64
            dist/openclaw-check-linux-x64
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
