name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: node22-linux-x64
            output: openclaw-check-linux-x64
          - os: macos-latest
            target: node22-macos-x64
            output: openclaw-check-macos-x64
          - os: macos-latest
            target: node22-macos-arm64
            output: openclaw-check-macos-arm64
          - os: windows-latest
            target: node22-win-x64
            output: openclaw-check-win-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Package
        run: npx @yao-pkg/pkg dist/check-env.cjs --targets ${{ matrix.target }} --output dist/${{ matrix.output }} --compress GZip

      - name: Create DMG (macOS only)
        if: runner.os == 'macOS'
        run: |
          chmod +x create-app.sh
          ./create-app.sh

      - name: Upload DMG (macOS only)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.target }}
          path: dist/*.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Display structure
        run: ls -R dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
